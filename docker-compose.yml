services:
  # ─── Base de données PostgreSQL ───
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: apex-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-apex_screener}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery broker + result backend) ───
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ───
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: apex-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Celery Worker ───
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: apex-celery-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=100

  # ─── Celery Beat (Scheduler) ───
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: apex-celery-beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ─── Frontend (Nginx + React) ───
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: apex-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
